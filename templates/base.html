<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .navbar {
            background: #1a56db;
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; font-size: 15px; }
        .navbar a:hover { text-decoration: underline; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .card {
            background: white;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        h1 { font-size: 22px; margin-bottom: 24px; color: #1a56db; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
        }
        .btn-primary { background: #1a56db; color: white; }
        .btn-primary:hover { background: #1648c0; }
        .btn-danger { background: #e02424; color: white; }
        .btn-secondary { background: #6b7280; color: white; }
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            white-space: pre-line;
        }
        .alert-error { background: #fde8e8; color: #c81e1e; border: 1px solid #f8b4b4; }
        .alert-success { background: #def7ec; color: #03543f; border: 1px solid #84e1bc; }
        .alert-warning { background: #fdf6b2; color: #723b13; border: 1px solid #faca15; }

        #page-loader {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: inherit;
        }
        #page-loader.hidden { display: none; }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        .loader-text {
            font-size: 14px;
            color: #555;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="page-loader" class="hidden">
        <div class="loader-spinner"></div>
        <div class="loader-text" id="loader-message">Đang tải...</div>
    </div>
    {% if user %}
    <nav class="navbar">
        <span><strong>{{ app_name }}</strong></span>
        <div>
            <a href="/upload">Upload</a>
            <a href="/history">Lịch sử</a>
            {% if user.role == 'admin' %}
            <a href="/settings">Cài đặt</a>
            <a href="/admin/users">Người dùng</a>
            {% endif %}
            <a href="/logout">Đăng xuất ({{ user.username }})</a>
        </div>
    </nav>
    {% endif %}
    <div class="container">
        {% if flash %}
        <div class="alert alert-{{ flash.level }}">{{ flash.message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script>
        function showLoader(message) {
            if (typeof message === 'undefined' || message === null) {
                message = 'Đang tải...';
            }
            document.getElementById('loader-message').textContent = message;
            document.getElementById('page-loader').classList.remove('hidden');
        }
        function hideLoader() {
            document.getElementById('page-loader').classList.add('hidden');
        }
        window.addEventListener('load', hideLoader);
        window.addEventListener('pageshow', hideLoader);

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('a[href]').forEach(function(link) {
                var href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('http')
                    && !href.startsWith('mailto')) {
                    link.addEventListener('click', function() {
                        showLoader('Đang tải...');
                    });
                }
            });
        });
    </script>
</body>
</html>
